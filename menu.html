<!DOCTYPE html>
<html>
<head>
<title>Birthday Menu</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
}

h1{
color:white;
margin-top:40px;
}

.container{
display:grid;
grid-template-columns:repeat(2,200px);
gap:30px;
justify-content:center;
margin-top:80px;
}

.card{
background:#052735cb;
height:150px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#ff4d6d;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
}

a{
text-decoration:none;
}


.balloons{
  position:absolute;
  bottom:-100px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.balloons span{
  width:50px;
  height:60px;
  background:red;
  border-radius:50%;
  position:relative;
  animation:float 3s infinite;
}

/* string */
.balloons span::after{
  content:"";
  width:2px;
  height:40px;
  background:#555;
  position:absolute;
  top:60px;
  left:50%;
}

/* different colors */
.balloons span:nth-child(1){ background:#ff4d4d; animation-delay:0s; }
.balloons span:nth-child(2){ background:#4da6ff; animation-delay:1s; }
.balloons span:nth-child(3){ background:#ffd11a; animation-delay:2s; }
.balloons span:nth-child(4){ background:#66ff66; animation-delay:3s; }
.balloons span:nth-child(5){ background:#ff66cc; animation-delay:4s; }
.balloons span:nth-child(6){ background:#ff4d4d; animation-delay:5s; }
.balloons span:nth-child(7){ background:#4da6ff; animation-delay:6s; }
.balloons span:nth-child(8){ background:#ffd11a; animation-delay:7s; }
.balloons span:nth-child(9){ background:#66ff66; animation-delay:8s; }
.balloons span:nth-child(10){ background:#66ffeb; animation-delay:9s; }

/* floating animation */
@keyframes float{
  0%{
    transform:translateY(0);
    opacity:1;
  }
  100%{
    transform:translateY(-100vh);
    opacity:0;
  }
}
.balloons-top{
  position:absolute;
  top:-100px;
  width:100%;
  display:flex;
  justify-content:space-around;
  z-index:10;
}

.balloons-top span{
  width:40px;
  height:60px;
  border-radius:50%;
  position:relative;
  animation:fall 6s linear infinite;
}

/* string */
.balloons-top span::after{
  content:"";
  width:2px;
  height:40px;
  background:#555;
  position:absolute;
  top:60px;
  left:50%;
}

/* colors */
.balloons-top span:nth-child(1){ background:#ff4d4d; animation-delay:0s; }
.balloons-top span:nth-child(2){ background:#4da6ff; animation-delay:1s; }
.balloons-top span:nth-child(3){ background:#ffd11a; animation-delay:2s; }
.balloons-top span:nth-child(4){ background:#66ff66; animation-delay:3s; }
.balloons-top span:nth-child(5){ background:#ff66cc; animation-delay:4s; }

/* falling animation */
@keyframes fall{
  0%{
    transform:translateY(0);
    opacity:1;
  }
  100%{
    transform:translateY(120vh);
    opacity:0;
  }
}
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;

/* background image */
background:url("akanksha/yaash3.jpg") no-repeat center center/cover;

}
